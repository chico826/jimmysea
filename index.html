<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的音乐播放器</title>
    <style>
        /* 全局样式 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            font-family: Arial, sans-serif;
        }

        /* 播放器卡片样式 */
        .player-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 400px;
            width: 90%;
        }

        h2 {
            color: #fff;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* 音频标签样式 */
        audio {
            width: 100%;
            margin: 15px 0;
            border-radius: 30px;
            outline: none;
        }

        /* 自定义控制按钮 */
        .custom-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .custom-controls button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 80px;
        }

        .custom-controls button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .custom-controls button:active {
            transform: scale(0.95);
        }

        /* 进度条和信息显示 */
        .info-bar {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            margin-top: 10px;
        }

        #current-time, #duration {
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="player-card">
        <h2>🎵 我的歌单</h2>
        
        <!-- HTML5 音频元素，先不添加 controls 属性以隐藏默认控件 -->
        <!-- 请将 your-audio.mp3 替换为你自己的音频文件 -->
        <audio id="audio-player" src="Better Days.mp3"></audio>

        <!-- 自定义控制条 -->
        <div class="custom-controls">
            <button id="play-btn">▶ 播放</button>
            <button id="pause-btn">⏸️ 暂停</button>
        </div>

        <!-- 显示当前播放进度 -->
        <div class="info-bar">
            <span id="current-time">00:00</span>
            <span id="duration">00:00</span>
        </div>
    </div>

    <script>
        // 获取页面元素
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const currentTimeDisplay = document.getElementById('current-time');
        const durationDisplay = document.getElementById('duration');

        // 播放按钮
        playBtn.addEventListener('click', () => {
            audio.play();
        });

        // 暂停按钮
        pauseBtn.addEventListener('click', () => {
            audio.pause();
        });

        // 当音频加载完毕，显示总时长
        audio.addEventListener('loadedmetadata', () => {
            const minutes = Math.floor(audio.duration / 60);
            const seconds = Math.floor(audio.duration % 60);
            durationDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        });

        // 更新当前播放进度
        audio.addEventListener('timeupdate', () => {
            const minutes = Math.floor(audio.currentTime / 60);
            const seconds = Math.floor(audio.currentTime % 60);
            currentTimeDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        });
    </script>
</body>
</html>
